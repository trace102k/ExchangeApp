<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" type="module" defer></script>
    <script src="helpers.js" type="module" defer></script>
    <title>Exchange App</title>
</head>
<body>
    <a href="https://www.exchangerate-api.com" hidden>Rates By Exchange Rate API</a>

    <div class="container">
        <img src="exchange.png" alt="Logo" class="logo">
        <h1 class="title">Exchange rates</h1>

        <section class="info-container">
            <div class="controls-wrapper">
                <select name="firstSelect" class="select-control" data-first-select>
                </select>
                <button class="swap-btn" data-swap-btn>swap</button>
                <select name="secondSelect" class="select-control" data-second-select>
                </select>
            </div>

            <div class="controls-wrapper">
                <input class="input-control" type="number" data-first-input>
                <span>=</span>
                <input class="input-control" type="number" data-second-input>
            </div>

            <p class="comparison-info" data-comparison-info></p>
        </section>
    </div>
    
</body>
</html>
